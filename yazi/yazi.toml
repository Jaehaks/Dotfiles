# A TOML linter such as Tombi can use this schema to validate your config.
# If you encounter any problems, please file an issue at https://github.com/yazi-rs/schemas.

#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false # for hungarian char
sort_fallback  = "alphabetical"
linemode       = "size_and_mtime"
show_hidden    = true
show_symlink   = false # it will be shown in status bar
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]

[preview]
wrap			= "no"
tab_size        = 2
max_width       = 690
max_height      = 930 # image preview size is fixed under this value, and cannot adapt to terminal size
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75 # doesn't works in windows-terminal
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
# open file using terminal program like nvim without 'block = true', Error invokes
# 'orphan' keep the process even if yazi is exited, but it is regardless of setting when I open gui program
edit = [
	{ run = "${EDITOR:-vi} %s", desc = "$EDITOR",      for = "unix", block = true },
	# { run = "code %s",          desc = "code",         for = "windows", orphan = true },
	# { run = "code -w %s",       desc = "code (block)", for = "windows", block = true },
	{ run = 'nvim %s'           , block = true    , desc = "nvim"   , for = "windows" },
	{ run = 'nvim-qt %s'        , orphan = true   , desc = "nvim-qt", for = "windows" },
	{ run = 'excel /e %s'     , orphan = true   , desc = "excel",   for = "windows" },
]
play = [
	{ run = "xdg-open %s1",    desc = "Play", for = "linux", orphan = true },
	{ run = "open %s",         desc = "Play", for = "macos" },
	{ run = 'start "" %s1',    desc = "Play", for = "windows", orphan = true },
	{ run = "termux-open %s1", desc = "Play", for = "android" },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "unix" },
	{ run = "mediainfo %s1 & pause", block = true, desc = "Show media info", for = "windows" },
]
open = [ # if folder, open explorer location under cursor
	{ run = "xdg-open %s1",    desc = "Open", for = "linux" },
	{ run = "open %s",         desc = "Open", for = "macos" },
	{ run = 'start "" %s1',    desc = "Open", for = "windows", orphan = true },
	{ run = "termux-open %s1", desc = "Open", for = "android" },
]
reveal = [ # if folder, open explorer current location
	{ run = "xdg-open %d1",         desc = "Reveal", for = "linux" },
	{ run = "open -R %s1",          desc = "Reveal", for = "macos" },
	{ run = "explorer /select,%s1", desc = "Reveal", for = "windows", orphan = true },
	{ run = "termux-open %d1",      desc = "Reveal", for = "android" },
	{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here", for = "linux" },
	# { run = 'bandizip bx -target:auto %*',   desc = "Extract here", for = "windows" },
	{ run = '7z x -aoa -sccUTF-8 -o* %s', desc = "Extract here", for = "windows", block = true },
]
download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S",        desc = "Download" },
]
sioyekopen = [
	{ run = 'sioyek --new-window %s1', orphan = true, desc = "sioyek", for = "windows" },
]
sumatraopen = [
	{ run = 'sumatraPDF %s1', orphan = true, desc = "SumatraPDF", for = "windows" },
]

[open] # set rules for opening for specific file + show open list
# mime is detected by `file --mime-type {}` function
rules = [
	# Folder
	{ url = "*/", use = [ "open", "reveal" ] }, # open explorer of current selected directory
	# user: unknown file extension (some files are recognized as octet_stream like binary)
	{ mime = "application/octet-stream", use = [ "edit", "reveal" ] },
	{ mime = "application/tex", use = [ "edit", "reveal" ] },
	{ mime = "application/msg", use = [ "open", "reveal" ] },
	# csv
	{ mime = "text/{csv,html}", use = [ "open", "reveal" ] },
	# Text
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "open", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# Code
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	{ mime = "application/{x-7z-compressed}", use = [ "extract", "reveal" ] },
	# pdf
	{ mime = "application/pdf", use = [ "open", "sioyekopen", "sumatraopen" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },
	# Fallback
	{ url = "*", use = [ "open", "reveal" ] },
]

[tasks] # NonZeroU8 = 1~255 value
file_workers     = 3 # file copy / delete / move,
plugin_workers   = 5 # plugin execution
fetch_workers    = 5 # get metadata (spotter?)
preload_workers  = 2 # preview cache
process_workers  = 5 # run external processor
bizarre_retry    = 3 # retry count when error, if high, delay will increase
image_alloc      = 1073741824  # 1GB allocation for higher RAM over 8GB
image_bound      = [ 10000, 10000 ] # change from (0,0) for limiting memory of large image preview
suppress_preload = false # preload to show preview faster

[plugin]
prepend_fetchers = [
	# plugins - git.yazi
	{ url = "*",  run = "git",  group = "git" },
	{ url = "*/",  run = "git", group = "git" },
	# plugins - githead.yazi
	{ url = "*",  run = "githead",  group = "githead" },
	{ url = "*/",  run = "githead", group = "githead" },
]
fetchers = [
	# Mimetype -- use local/remote from mime-ext plugins
	{ url = "*/",         run = "mime.dir",    prio = "high", group = "mime" },
	{ url = "local://*",  run = "mime-ext.local",  prio = "high", group = "mime" }, # plugins - mime-ext.yazi
	{ url = "remote://*", run = "mime-ext.remote", prio = "high", group = "mime" }, # plugins - mime-ext.yazi
]

spotters = [
	# Multi-file
	{ mime = "multi/*", run = "multi" },
	# Folder
	{ url = "*/", run = "folder" },
	# Code
	# { mime = "text/*", run = "code" },
	# { mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# Image
	# { mime = "image/{avif,hei?,jxl}", run = "magick" },
	# { mime = "image/svg+xml", run = "svg" },
	# { mime = "image/*", run = "image" },
	# Video
	# { mime = "video/*", run = "video" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file-extra-metadata" }, # plugin : file-extra-metadata
]
preloaders = [
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
previewers = [
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# JSON
	{ mime = "application/{json,ndjson}", run = "json" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "zipname" }, # plugin : zipname.yazi
	{ mime = "application/{x-7z-compressed}", run = "zipname"}, # plugin : zipname.yazi
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	# Virtual Disk / Disk Image
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	# Empty file
	{ mime = "inode/empty", run = "empty" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file-extra-metadata" }, # plugin : file-extra-metadata
]


[input]
cursor_blink = false

# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title 	= "Trash {n} selected file{s}?"
trash_origin	= "center"
trash_offset	= [ 0, 0, 70, 20 ]

# delete
delete_title 	= "Permanently delete {n} selected file{s}?"
delete_origin	= "center"
delete_offset	= [ 0, 0, 70, 20 ]

# overwrite
overwrite_title   = "Overwrite file?"
overwrite_body = "Will overwrite the following file:"
overwrite_origin  = "center"
overwrite_offset  = [ 0, 0, 50, 15 ]

# quit
quit_title   = "Quit?"
quit_body   = "There are unfinished tasks, quit anyway?\n(Open task manager with default key 'w')"
quit_origin  = "center"
quit_offset  = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false
